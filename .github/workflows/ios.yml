name: iOS

# Simulator jobs are slow, so this only runs when app-facing code changes.
on:
  push:
    branches: [main]
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

# Superseded pushes to a PR cancel that PR's running checks, but pushes to
# main must never cancel each other: back-to-back merges would leave the
# earlier merge unvalidated (this let a non-compiling commit land unnoticed).
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ui-tests:
    name: App build & UI tests
    # macos-26 ships Xcode 26.x (default 26.5) with the iOS 26 SDK, so the
    # Liquid Glass code paths behind `#if compiler(>=6.2)` are compiled and
    # exercised here instead of silently skipped (#44). The gate itself stays
    # for contributors on older local toolchains. Package jobs (ci.yml) don't
    # need the newer SDK and stay on macos-15.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 -E "iPhone" | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build and run UI tests
        # OnlineMatchUITests skips itself when no server is listening on
        # 127.0.0.1:8080, so this covers the offline flows.
        #
        # -retry-tests-on-failure absorbs runner-infrastructure flakes (stuck
        # simulator clones, xctrunner launch RequestDenied) that have caused
        # most of this lane's red runs; genuinely broken tests still fail all
        # repetitions. The tail is sized so assertion messages survive — at
        # 100 lines they were getting cut, leaving red runs undiagnosable.
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios-chess-client/ios-chess-client.xcodeproj \
            -scheme ios-chess-client \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -test-repetition-relaunch-enabled YES \
            -only-testing:ios-chess-clientUITests/GameFlowUITests \
            -only-testing:ios-chess-clientUITests/OnlineMatchUITests \
            | tail -400

      - name: Upload result bundle on failure
        # The tail above keeps the step log scannable; the xcresult has the
        # full assertion details plus screenshots when a test fails.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
          retention-days: 7
