name: iOS

# Simulator jobs are slow, so this only runs when code the app or its online
# E2E depends on changes — which includes the server, since the UI-test job
# boots chess-server to cover the live matchmaking and rematch flows.
on:
  push:
    branches: [main]
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - "chess-server/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - "chess-server/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

# Superseded pushes to a PR cancel that PR's running checks, but pushes to
# main must never cancel each other: back-to-back merges would leave the
# earlier merge unvalidated (this let a non-compiling commit land unnoticed).
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ui-tests:
    name: App build & UI tests
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Cache SwiftPM build (server)
        uses: actions/cache@v6
        with:
          path: chess-server/.build
          key: server-spm-${{ runner.os }}-${{ hashFiles('chess-server/Package.swift', 'chess-server/Package.resolved') }}
          restore-keys: server-spm-${{ runner.os }}-

      - name: Build chess-server
        run: swift build --package-path chess-server

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 -E "iPhone" | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build app and UI tests
        # The heavy compile happens before the server boots: a background
        # process that idles through ~10 minutes of xcodebuild + simulator
        # memory pressure is a prime target for the macOS memory killer
        # (observed once: the server died silently mid-build).
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project ios-chess-client/ios-chess-client.xcodeproj \
            -scheme ios-chess-client \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            | tail -30

      - name: Start chess-server
        # OnlineMatchUITests talks to 127.0.0.1:8080 and skips itself when
        # nothing is listening. Booting the real server here means CI covers
        # the online flows (matchmaking, live play, rematch), not just the
        # offline ones. The test process doubles as the opponent bot, so one
        # runner plays both sides of the match. The wrapper loop revives the
        # server if it's killed, and records each death in the log.
        run: |
          (cd chess-server && nohup bash -c \
            'while true; do .build/debug/App serve --hostname 127.0.0.1 --port 8080 >> server.log 2>&1; echo "[watchdog] server exited ($?), restarting" >> server.log; sleep 1; done' \
            > /dev/null 2>&1 &)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null; then
              echo "chess-server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::chess-server did not become healthy within 30s"
          tail -50 chess-server/server.log
          exit 1

      - name: Run UI tests
        # The online E2E keeps its self-skip to protect local runs without a
        # server, but in CI a skip means the server died — fail loudly rather
        # than shipping green without the online coverage.
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project ios-chess-client/ios-chess-client.xcodeproj \
            -scheme ios-chess-client \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:ios-chess-clientUITests/GameFlowUITests \
            -only-testing:ios-chess-clientUITests/OnlineMatchUITests \
            | tee ui-tests.log | tail -100
          if grep -q "testOnlineMatchAgainstBot.*skipped" ui-tests.log; then
            echo "::error::the online E2E skipped itself — chess-server was not reachable during the test"
            exit 1
          fi

      - name: Server diagnostics
        if: failure()
        run: |
          echo "--- processes:"; pgrep -lf "App serve" || echo "(no server process)"
          echo "--- health:"; curl -sv --max-time 5 http://127.0.0.1:8080/health || true
          echo "--- memory:"; vm_stat | head -8
          echo "--- server.log tail:"; tail -30 chess-server/server.log || true

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chess-server-log
          path: chess-server/server.log
          if-no-files-found: ignore
