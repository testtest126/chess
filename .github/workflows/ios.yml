name: iOS

# Simulator jobs are slow, so this only runs when code the app or its online
# E2E depends on changes — which includes the server, since the UI-test job
# boots chess-server to cover the live matchmaking flows (#35).
on:
  push:
    branches: [main]
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - "chess-server/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios-chess-client/**"
      - "ChessKit/**"
      - "chess-server/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

# Superseded pushes to a PR cancel that PR's running checks, but pushes to
# main must never cancel each other: back-to-back merges would leave the
# earlier merge unvalidated (this let a non-compiling commit land unnoticed).
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ui-tests:
    name: App build & UI tests
    # macos-26 ships Xcode 26.x (default 26.5) with the iOS 26 SDK, so the
    # Liquid Glass code paths behind `#if compiler(>=6.2)` are compiled and
    # exercised here instead of silently skipped (#44). The gate itself stays
    # for contributors on older local toolchains. Package jobs (ci.yml) don't
    # need the newer SDK and stay on macos-15.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Cache SwiftPM build (server)
        uses: actions/cache@v6
        with:
          path: chess-server/.build
          key: server-spm-${{ runner.os }}-${{ hashFiles('chess-server/Package.swift', 'chess-server/Package.resolved') }}
          restore-keys: server-spm-${{ runner.os }}-

      - name: Build chess-server
        # Built (not yet started) before the heavy app compile so a server
        # build break fails the job in its first minutes, not its last.
        run: swift build --package-path chess-server

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 -E "iPhone" | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Boot the simulator before xcodebuild touches it
        # Letting `xcodebuild test` cold-boot the simulator hung the whole
        # job on macos-26 (run 29091523169: 40 min of silence after
        # IDELaunchParametersSnapshot, no test suite ever started). Booting
        # explicitly and waiting via `bootstatus -b` makes the launch
        # deterministic — and a boot problem now fails *this* step in
        # minutes with its own log, instead of an opaque job timeout.
        timeout-minutes: 10
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true  # "already booted" is fine
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Build app and UI tests
        # Compile before the server boots: a background process idling
        # through ~10 minutes of xcodebuild + simulator memory pressure is a
        # prime target for the macOS memory killer (observed on #59: the
        # server died silently mid-build).
        timeout-minutes: 25
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project ios-chess-client/ios-chess-client.xcodeproj \
            -scheme ios-chess-client \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            | tail -30

      - name: Start chess-server
        # OnlineMatchUITests talks to 127.0.0.1:8080 and skips itself when
        # nothing is listening; booting the real server turns the online E2E
        # on (matchmaking, live play, resignation — the test process doubles
        # as the opponent bot, so one runner plays both sides of the match).
        # The watchdog loop revives a killed server and records each death
        # in the log.
        run: |
          (cd chess-server && nohup bash -c \
            'while true; do .build/debug/App serve --hostname 127.0.0.1 --port 8080 >> server.log 2>&1; echo "[watchdog] server exited ($?), restarting" >> server.log; sleep 1; done' \
            > /dev/null 2>&1 &)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null; then
              echo "chess-server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::chess-server did not become healthy within 30s"
          tail -50 chess-server/server.log
          exit 1

      - name: Run UI tests
        # -parallel-testing-enabled NO is what makes the online E2E reach the
        # server: parallel testing runs UI tests on simulator CLONES, whose
        # 127.0.0.1 does not reach the host loopback. #59's run 29081469990
        # is the evidence — the server answered curl on the host at the same
        # moment the in-clone probe timed out and the suite skipped. On the
        # destination simulator itself, loopback is shared with the host.
        #
        # -retry-tests-on-failure absorbs runner-infrastructure flakes (stuck
        # simulators, xctrunner launch RequestDenied) that have caused most
        # of this lane's red runs; genuinely broken tests still fail all
        # repetitions. The tail is sized so assertion messages survive — at
        # 100 lines they were getting cut, leaving red runs undiagnosable.
        #
        # In CI a skip of the online E2E means the server or its
        # reachability broke — fail loudly rather than shipping green
        # without the coverage. The self-skip stays for local runs.
        #
        # The step-level timeout (vs only the job's) matters: a step timeout
        # is a *failure*, so the xcresult upload below still runs; a job
        # timeout is a cancellation, which skips it and leaves no evidence.
        timeout-minutes: 30
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project ios-chess-client/ios-chess-client.xcodeproj \
            -scheme ios-chess-client \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            -retry-tests-on-failure \
            -test-iterations 3 \
            -test-repetition-relaunch-enabled YES \
            -parallel-testing-enabled NO \
            -only-testing:ios-chess-clientUITests/GameFlowUITests \
            -only-testing:ios-chess-clientUITests/OnlineMatchUITests \
            | tee ui-tests.log | tail -400
          if grep -q "testOnlineMatchAgainstBot.*skipped" ui-tests.log; then
            echo "::error::the online E2E skipped itself — chess-server was not reachable from the test"
            exit 1
          fi

      - name: Server diagnostics
        if: failure()
        run: |
          echo "--- processes:"; pgrep -lf "App serve" || echo "(no server process)"
          echo "--- health:"; curl -sv --max-time 5 http://127.0.0.1:8080/health || true
          echo "--- memory:"; vm_stat | head -8
          echo "--- server.log tail:"; tail -30 chess-server/server.log || true

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: chess-server-log
          path: chess-server/server.log
          if-no-files-found: ignore

      - name: Upload result bundle on failure
        # The tail above keeps the step log scannable; the xcresult has the
        # full assertion details plus screenshots when a test fails.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
          retention-days: 7
