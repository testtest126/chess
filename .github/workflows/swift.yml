# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build ChessKit
      run: cd ChessKit && swift build -v
    - name: Run ChessKit tests
      run: cd ChessKit && swift test -v
    - name: Build chess-server
      run: cd chess-server && swift build -v
    - name: Run chess-server tests
      run: cd chess-server && swift test -v
