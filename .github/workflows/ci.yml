name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chesskit:
    name: ChessKit tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: ChessKit/.build
          key: chesskit-spm-${{ runner.os }}-${{ hashFiles('ChessKit/Package.swift', 'ChessKit/Package.resolved') }}
          restore-keys: chesskit-spm-${{ runner.os }}-
      - name: Run package tests
        run: swift test --package-path ChessKit

  server:
    name: Server tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: chess-server/.build
          key: server-spm-${{ runner.os }}-${{ hashFiles('chess-server/Package.swift', 'chess-server/Package.resolved') }}
          restore-keys: server-spm-${{ runner.os }}-
      - name: Run server tests
        run: swift test --package-path chess-server
