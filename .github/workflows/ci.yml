name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Superseded pushes to a PR cancel that PR's running checks, but pushes to
# main must never cancel each other: back-to-back merges would leave the
# earlier merge unvalidated (this let a non-compiling commit land unnoticed).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chesskit:
    name: ChessKit tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: ChessKit/.build
          key: chesskit-spm-${{ runner.os }}-${{ hashFiles('ChessKit/Package.swift', 'ChessKit/Package.resolved') }}
          restore-keys: chesskit-spm-${{ runner.os }}-
      - name: Run package tests
        run: swift test --package-path ChessKit

  server:
    name: Server tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: chess-server/.build
          key: server-spm-${{ runner.os }}-${{ hashFiles('chess-server/Package.swift', 'chess-server/Package.resolved') }}
          restore-keys: server-spm-${{ runner.os }}-
      - name: Run server tests
        run: swift test --package-path chess-server

  # Fast, cheap style gate (issue #100). Runs on ubuntu with pinned prebuilt
  # binaries — no toolchain build, finishes in well under two minutes.
  # NOT a required check: flipping it to enforcing is the orchestrator's call
  # (issue #100, step 3).
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Pin both tools: rule defaults change between releases, and an
      # unpinned lint job starts failing on unrelated PRs after upstream
      # updates. Keep local installs on the same versions.
      SWIFTFORMAT_VERSION: 0.62.1
      SWIFTLINT_VERSION: 0.65.0
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned SwiftFormat and SwiftLint (prebuilt Linux binaries)
        run: |
          curl -fsSL -o /tmp/swiftformat.zip \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat_linux.zip"
          unzip -q -o /tmp/swiftformat.zip -d /tmp/tools
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux_amd64.zip"
          unzip -q -o /tmp/swiftlint.zip -d /tmp/tools
          chmod +x /tmp/tools/swiftformat_linux /tmp/tools/swiftlint-static
      - name: SwiftFormat (check only)
        run: /tmp/tools/swiftformat_linux --lint .
      - name: SwiftLint (curated rules, warnings-only)
        run: /tmp/tools/swiftlint-static lint --reporter github-actions-logging
