name: Feature request
description: Suggest an improvement to the app, server, or engine
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What would you like to see?
      placeholder: A rematch button after online games …
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why is it useful?
